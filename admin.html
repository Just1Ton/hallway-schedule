<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Super Admin — Schedule Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--panel:#111827;--panel2:#0d1320;
  --border:#2a3245;--border2:#1e2a3d;
  --blue-border:#2e5080;--blue-bg:#1a2d4a;--blue-dark:#0f2040;
  --blue-accent:#7eb8f7;--blue-mid:#4a7aad;--blue-dim:#2e4a6a;
  --green-bg:#0d1a10;--green-border:#1a3a22;--green-text:#4a8060;--green-accent:#7ec89a;
  --red-bg:#1a0a0a;--red-border:#3a1a1a;--red-text:#c05050;
  --text:#e8e4d8;--text2:#9aacbf;--text3:#6b7a99;--text4:#4a6080;
  --muted:#8a9ab5;
}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LAYOUT ── */
#app{display:none;}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.loading-text{font-family:'Fraunces',serif;font-size:1.5rem;color:var(--text3);font-weight:300;}

.topbar{background:var(--panel);border-bottom:0.5px solid var(--border);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:300;color:#c8bfa8;}
.topbar-right{display:flex;align-items:center;gap:1rem;}
.user-pill{font-size:.68rem;color:var(--text4);background:var(--panel2);border:0.5px solid var(--border2);border-radius:6px;padding:.28rem .7rem;}
.btn-signout{background:transparent;border:0.5px solid var(--border);border-radius:7px;color:var(--text3);font-family:'DM Mono',monospace;font-size:.7rem;padding:.3rem .8rem;cursor:pointer;}
.btn-signout:hover{border-color:var(--red-border);color:var(--red-text);}

.main{padding:2rem;max-width:900px;margin:0 auto;}
.section-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:300;color:#c8bfa8;margin-bottom:1rem;}

/* ── SCHOOL CARDS ── */
.schools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:2rem;}
.school-card{background:var(--panel);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem;cursor:pointer;transition:border-color .2s;}
.school-card:hover{border-color:var(--blue-border);}
.school-card-name{font-family:'Fraunces',serif;font-size:1.1rem;color:#c8dff5;margin-bottom:.3rem;}
.school-card-slug{font-size:.68rem;color:var(--text4);letter-spacing:.08em;margin-bottom:.75rem;}
.school-card-actions{display:flex;gap:.5rem;}
.btn-edit{background:var(--blue-bg);border:0.5px solid var(--blue-border);border-radius:6px;color:var(--blue-accent);font-family:'DM Mono',monospace;font-size:.68rem;padding:.28rem .7rem;cursor:pointer;}
.btn-edit:hover{background:#1f3a60;}
.btn-view{background:transparent;border:0.5px solid var(--border);border-radius:6px;color:var(--text3);font-family:'DM Mono',monospace;font-size:.68rem;padding:.28rem .7rem;cursor:pointer;text-decoration:none;display:inline-block;}
.btn-view:hover{border-color:var(--blue-border);color:var(--blue-accent);}
.btn-danger{background:transparent;border:0.5px solid var(--red-border);border-radius:6px;color:var(--red-text);font-family:'DM Mono',monospace;font-size:.68rem;padding:.28rem .7rem;cursor:pointer;}
.btn-danger:hover{background:var(--red-bg);}

.btn-add-school{background:var(--green-bg);border:0.5px solid var(--green-border);border-radius:8px;color:var(--green-accent);font-family:'DM Mono',monospace;font-size:.76rem;padding:.5rem 1.2rem;cursor:pointer;}
.btn-add-school:hover{background:#0f2a0f;}

/* ── MODAL ── */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(5,8,18,.92);z-index:100;overflow-y:auto;padding:1.5rem;}
#modal-overlay.open{display:block;}
#modal{background:var(--panel);border:0.5px solid #2a3a55;border-radius:16px;padding:2rem;max-width:700px;margin:0 auto;}
#modal h2{font-family:'Fraunces',serif;font-size:1.2rem;color:#c8bfa8;font-weight:300;margin-bottom:1.5rem;}

.tab-bar{display:flex;gap:.35rem;margin-bottom:1.25rem;flex-wrap:wrap;}
.tab{background:transparent;border:0.5px solid var(--border);border-radius:7px;color:var(--text3);font-family:'DM Mono',monospace;font-size:.72rem;padding:.32rem .75rem;cursor:pointer;letter-spacing:.04em;}
.tab:hover{background:#1a1f2e;}
.tab.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue-accent);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.mf{margin-bottom:.85rem;}
.mf label{display:block;font-size:.66rem;color:var(--text4);letter-spacing:.1em;margin-bottom:.28rem;text-transform:uppercase;}
.mf input,.mf select{background:#0a0e1a;border:0.5px solid #2a3a55;border-radius:7px;color:#c8dff5;font-family:'DM Mono',monospace;font-size:.8rem;padding:.42rem .7rem;}
.mf input{width:100%;}
.mf select{width:100%;cursor:pointer;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.esec{font-size:.66rem;color:#3a4a5a;letter-spacing:.1em;text-transform:uppercase;margin:1rem 0 .45rem;padding-bottom:.25rem;border-bottom:0.5px solid #1a2535;}

.srow{display:grid;grid-template-columns:1fr 76px 76px 26px;gap:.35rem;align-items:center;margin-bottom:.35rem;}
.srow input{padding:.36rem .5rem;font-size:.74rem;background:#0a0e1a;border:0.5px solid #2a3a55;border-radius:5px;color:#c8dff5;font-family:'DM Mono',monospace;width:100%;}
.rmv-btn{background:transparent;border:0.5px solid #3a2a2a;border-radius:5px;color:#6a3a3a;font-size:.9rem;cursor:pointer;width:24px;height:24px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rmv-btn:hover{background:#2a1515;color:#c05050;}
.add-btn{background:#0a1a0a;border:0.5px solid #1a3a1a;border-radius:7px;color:#3a7a4a;font-family:'DM Mono',monospace;font-size:.72rem;padding:.38rem .85rem;cursor:pointer;width:100%;margin-top:.3rem;}
.add-btn:hover{background:#0f2a0f;}
.eod-row{display:grid;grid-template-columns:1fr 88px;gap:.35rem;align-items:center;margin-bottom:.3rem;}
.eod-row input{padding:.36rem .5rem;font-size:.74rem;background:#0a0e1a;border:0.5px solid #2a3a55;border-radius:5px;color:#c8dff5;font-family:'DM Mono',monospace;width:100%;}
.eod-note{font-size:.64rem;color:#2a5a3a;margin-top:.25rem;}

.anchor-box{background:#0d1626;border:0.5px solid var(--blue-border);border-radius:10px;padding:1rem;margin-top:.75rem;}
.anchor-box p{font-size:.72rem;color:var(--text3);line-height:1.6;margin-bottom:.75rem;}
.anchor-grid{display:grid;grid-template-columns:130px 1fr auto;gap:.5rem;align-items:center;}
.anchor-grid input,.anchor-grid select{padding:.38rem .6rem;font-size:.76rem;background:#0a0e1a;border:0.5px solid #2a3a55;border-radius:6px;color:#c8dff5;font-family:'DM Mono',monospace;width:100%;}
.anchor-set-btn{background:var(--blue-bg);border:0.5px solid var(--blue-border);border-radius:7px;color:var(--blue-accent);font-family:'DM Mono',monospace;font-size:.72rem;padding:.38rem .8rem;cursor:pointer;white-space:nowrap;}
.anchor-set-btn:hover{background:#1f3a60;}
.anchor-current{font-size:.68rem;color:var(--text3);margin-top:.6rem;}
.anchor-current span{color:var(--blue-accent);}

.info-note{font-size:.68rem;color:var(--text4);background:#0d1320;border:0.5px solid var(--border2);border-radius:7px;padding:.6rem .8rem;line-height:1.6;margin-bottom:.85rem;}
.ns-row{display:grid;grid-template-columns:110px 1fr 26px;gap:.5rem;align-items:center
