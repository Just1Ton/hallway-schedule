<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Schedule Admin — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & ROOT VARIABLES ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--panel:#111827;
  --border:#2a3245;--border2:#1e2a3d;
  --blue-border:#2e5080;--blue-bg:#1a2d4a;
  --blue-accent:#7eb8f7;--blue-mid:#4a7aad;
  --text:#e8e4d8;--text2:#9aacbf;--text3:#6b7a99;--text4:#4a6080;
  --muted:#8a9ab5;
}

/* ── FULL PAGE CENTERING ──
   Centers the login box both vertically and horizontally */
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}

/* ── LOGIN BOX ── */
.login-box{background:var(--panel);border:0.5px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:400px;}
.login-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:300;color:#c8bfa8;margin-bottom:.4rem;}
.login-sub{font-size:.72rem;color:var(--text4);letter-spacing:.08em;margin-bottom:2rem;}

/* ── FORM FIELDS ── */
.mf{margin-bottom:1rem;}
.mf label{display:block;font-size:.66rem;color:var(--text4);letter-spacing:.1em;margin-bottom:.28rem;text-transform:uppercase;}
.mf input{width:100%;background:#0a0e1a;border:0.5px solid #2a3a55;border-radius:7px;color:#c8dff5;font-family:'DM Mono',monospace;font-size:.85rem;padding:.55rem .8rem;}
.mf input:focus{outline:none;border-color:var(--blue-border);}

/* ── SIGN IN BUTTON ── */
.btn-login{width:100%;background:#1a3a6a;border:0.5px solid var(--blue-border);border-radius:8px;color:var(--blue-accent);font-family:'DM Mono',monospace;font-size:.82rem;padding:.65rem 1.2rem;cursor:pointer;margin-top:.5rem;transition:background .2s;}
.btn-login:hover{background:#1f4a80;}
.btn-login:disabled{opacity:.5;cursor:not-allowed;}

/* ── ERROR MESSAGE ──
   Hidden by default, shown when login fails */
.error-msg{font-size:.72rem;color:#c05050;background:#1a0a0a;border:0.5px solid #3a1a1a;border-radius:7px;padding:.5rem .75rem;margin-top:.75rem;display:none;}
.error-msg.visible{display:block;}
</style>
</head>
<body>

<!-- Login box: centered on page -->
<div class="login-box">
  <div class="login-title">Schedule Admin</div>
  <div class="login-sub">Sign in to manage your school schedules</div>

  <!-- Email field -->
  <div class="mf">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com"/>
  </div>

  <!-- Password field -->
  <div class="mf">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>

  <!-- Submit button — disabled while login is in progress -->
  <button class="btn-login" id="login-btn" onclick="doLogin()">Sign in</button>

  <!-- Error message shown if login fails -->
  <div class="error-msg" id="error-msg"></div>
</div>

<script>
// ── SUPABASE CONFIGURATION ────────────────────────────────────
// Uses the anon key for authentication — this is safe for client-side use
const SUPABASE_URL = 'https://zatmvuxtgunoruvvofcr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphdG12dXh0Z3Vub3J1dnZvZmNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDIzMjksImV4cCI6MjA5MTU3ODMyOX0.gF6jtv4IyJj1C_XXt7ZmHXRr8ZcxAKk1CchsJvu76AI';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── AUTO-REDIRECT IF ALREADY LOGGED IN ───────────────────────
// If the user already has an active session, skip the login form
// and redirect them directly to the appropriate admin page
db.auth.getSession().then(({ data: { session } }) => {
  if (session) redirectByRole(session.user.id);
});

// ── REDIRECT BY ROLE ──────────────────────────────────────────
// Looks up the user's role in user_profiles and redirects accordingly:
//   superadmin  → /admin.html
//   schooladmin → /school-admin.html
async function redirectByRole(userId) {
  const { data } = await db
    .from('user_profiles')
    .select('role, school_id')
    .eq('id', userId)
    .single();

  if (!data) return;
  if (data.role === 'superadmin') {
    window.location.href = '/admin.html';
  } else if (data.role === 'schooladmin') {
    window.location.href = '/school-admin.html';
  }
}

// ── LOGIN ─────────────────────────────────────────────────────
// Authenticates the user with Supabase using email and password.
// Shows an error message if login fails.
// On success, redirects based on role via redirectByRole().
async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('error-msg');

  // Clear any previous error
  err.classList.remove('visible');

  // Disable button and show loading state while request is in flight
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    // Show error and re-enable button so user can try again
    err.textContent = error.message;
    err.classList.add('visible');
    btn.disabled = false;
    btn.textContent = 'Sign in';
    return;
  }

  // Login successful — redirect to correct admin page
  await redirectByRole(data.user.id);
}

// ── KEYBOARD SHORTCUT ─────────────────────────────────────────
// Allow the user to submit the form by pressing Enter
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
