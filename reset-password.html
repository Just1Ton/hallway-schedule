<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:#0a0e1a;color:#e8e4d8;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#111827;border:0.5px solid #2a3245;border-radius:16px;padding:2rem;width:100%;max-width:380px;}
h1{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:300;color:#c8bfa8;margin-bottom:1.5rem;}
label{display:block;font-size:.66rem;color:#4a6080;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.28rem;}
input{width:100%;background:#0a0e1a;border:0.5px solid #2a3a55;border-radius:7px;color:#c8dff5;font-family:'DM Mono',monospace;font-size:.8rem;padding:.5rem .7rem;margin-bottom:1rem;}
button{width:100%;background:#1a3a6a;border:0.5px solid #2e5080;border-radius:8px;color:#7eb8f7;font-family:'DM Mono',monospace;font-size:.76rem;padding:.55rem;cursor:pointer;}
button:hover{background:#1f4a80;}
.msg{font-size:.72rem;margin-top:.75rem;padding:.5rem .75rem;border-radius:7px;display:none;}
.msg.success{background:#0d1a10;border:0.5px solid #1a3a22;color:#7ec89a;display:block;}
.msg.error{background:#1a0a0a;border:0.5px solid #3a1a1a;color:#c05050;display:block;}
</style>
</head>
<body>
<div class="card">
  <h1>Set new password</h1>
  <label>New password</label>
  <input type="password" id="password" placeholder="••••••••"/>
  <label>Confirm password</label>
  <input type="password" id="confirm" placeholder="••••••••"/>
  <button onclick="resetPassword()">Update password</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://zatmvuxtgunoruvvofcr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphdG12dXh0Z3Vub3J1dnZvZmNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDIzMjksImV4cCI6MjA5MTU3ODMyOX0.gF6jtv4IyJj1C_XXt7ZmHXRr8ZcxAKk1CchsJvu76AI';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

db.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('msg').textContent = 'Ready — enter your new password below.';
    document.getElementById('msg').className = 'msg success';
  }
});

async function resetPassword() {
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const msg = document.getElementById('msg');

  console.log('password length:', password.length);
  console.log('passwords match:', password === confirm);

  msg.className = 'msg';

  if (!password || password.length < 6) {
    msg.textContent = 'Password must be at least 6 characters.';
    msg.className = 'msg error';
    return;
  }
  if (password !== confirm) {
    msg.textContent = 'Passwords do not match.';
    msg.className = 'msg error';
    return;
  }

  console.log('calling updateUser...');
  const { data, error } = await db.auth.updateUser({ password });
  console.log('updateUser result:', JSON.stringify(data), JSON.stringify(error));

  if (error) {
    msg.textContent = 'Error: ' + error.message;
    msg.className = 'msg error';
  } else {
    msg.textContent = 'Password updated successfully. Redirecting...';
    msg.className = 'msg success';
    setTimeout(() => window.location.href = '/login.html', 2000);
  }
}
</script>
</body>
</html>
