<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>School Day Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── RESET & ROOT VARIABLES ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e1a;--panel:#111827;--panel2:#0d1320;
  --border:#2a3245;--border2:#1e2a3d;
  --blue-border:#2e5080;--blue-bg:#1a2d4a;--blue-dark:#0f2040;
  --blue-accent:#7eb8f7;--blue-mid:#4a7aad;--blue-dim:#2e4a6a;
  --green-bg:#0d1a10;--green-border:#1a3a22;--green-text:#4a8060;--green-accent:#7ec89a;
  --text:#e8e4d8;--text2:#9aacbf;--text3:#6b7a99;--text4:#4a6080;
  --muted:#8a9ab5;
}

/* ── BASE ── */
html, body {
  height: 100dvh;
  overflow: hidden;
  font-family: 'DM Mono', monospace;
  background: var(--bg);
  color: var(--text);
}

/* ── MAIN DISPLAY SCREEN ──
   Two-column grid: left panel (clock + current period) | right (schedule list)
   Locked to viewport height — never scrolls */
#display-screen {
  display: grid;
  grid-template-columns: 33vw 1fr;
  grid-template-rows: auto 1fr;
  gap: 1.25rem;
  padding: 1.25rem;
  height: 100vh;
  overflow: hidden;
}

/* ── LEFT PANEL ── */
#left-panel {
  grid-column: 1;
  grid-row: 1 / 3;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: var(--panel);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: 2rem 1.75rem;
  overflow: hidden;
}

.school-name {
  font-family: 'Fraunces', serif;
  font-size: clamp(.7rem, 1.2vw, 1.1rem);
  font-weight: 300;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* ── CLOCK ── */
.clock-wrap { margin: .75rem 0; }
.clock-time {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  line-height: 1;
  color: #f0ebe0;
  letter-spacing: -.03em;
  display: grid;
  grid-template-rows: auto auto;
  justify-items: start;
  font-variant-numeric: tabular-nums;
}
.clock-hm {
  font-size: clamp(2rem, 8vw, 7rem);
  white-space: nowrap;
}
.clock-seconds-row { display: flex; align-items: baseline; gap: .35em; }
.clock-seconds {
  font-size: clamp(1.2rem, 4.5vw, 4rem);
  color: #4a6a8a;
  font-weight: 300;
  white-space: nowrap;
  display: inline-block;
  width: 2ch;
  font-variant-numeric: tabular-nums;
}
.clock-ampm { font-size: clamp(.8rem, 2vw, 1.6rem); color: var(--blue-mid); }
.clock-date { font-size: clamp(.6rem, 1vw, 1rem); color: var(--text3); margin-top: .4rem; }

/* ── DAY BADGE ── */
.day-badge {
  display: inline-block;
  background: var(--blue-bg);
  border: 0.5px solid var(--blue-border);
  border-radius: 8px;
  padding: .4rem .9rem;
  font-size: clamp(.6rem, 1vw, .9rem);
  color: var(--blue-accent);
  letter-spacing: .08em;
  margin-bottom: .75rem;
}

/* ── NOW CARD: current period with progress bar ── */
.now-card {
  background: var(--blue-bg);
  border: 1px solid var(--blue-border);
  border-radius: 12px;
  padding: 1.25rem;
}
.now-label {
  font-size: clamp(.55rem, .9vw, .75rem);
  color: var(--blue-mid);
  letter-spacing: .15em;
  text-transform: uppercase;
  margin-bottom: .45rem;
}
.now-name {
  font-family: 'Fraunces', serif;
  font-size: clamp(1rem, 2.5vw, 1.8rem);
  color: var(--blue-accent);
  font-weight: 700;
}
.now-time { font-size: clamp(.6rem, 1vw, .9rem); color: var(--blue-mid); margin-top: .15rem; }
.prog-wrap { background: #0d1626; border-radius: 3px; height: 6px; margin-top: .75rem; overflow: hidden; }
.prog-bar { height: 100%; background: var(--blue-border); border-radius: 3px; transition: width 0.25s linear; }
.prog-remain { font-size: clamp(.5rem, .9vw, .78rem); color: var(--blue-mid); margin-top: .35rem; text-align: right; }

/* ── RIGHT PANEL HEADER ── */
#right-top {
  grid-column: 2;
  grid-row: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(1rem, 2vw, 1.6rem);
  font-weight: 300;
  color: #c8bfa8;
}
.day-pill {
  font-size: clamp(.55rem, .8vw, .65rem);
  color: #4a5568;
  letter-spacing: .1em;
  text-transform: uppercase;
  background: #1a1f2e;
  border: 0.5px solid var(--border);
  border-radius: 5px;
  padding: .28rem .7rem;
}

/* ── SCHEDULE LIST ──
   flex column container — each row gets flex:1 to fill space equally
   overflow-y:auto allows scrolling if needed but rows are sized to fit */
#sched-list {
  grid-column: 2;
  grid-row: 2;
  display: flex;
  flex-direction: column;
  gap: .4rem;
  overflow-y: auto;
  background: var(--panel);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  padding: .75rem;
}

/* ── SCHEDULE ROW ──
   flex:1 means all rows share the available height equally.
   The active row gets more height via padding which pushes other rows smaller. */
.pr {
  display: grid;
  grid-template-columns: minmax(0, 5.5rem) 1fr minmax(0, 5.5rem);
  align-items: center;
  gap: .5rem;
  padding: 0 .9rem;
  border-radius: 10px;
  border: 0.5px solid transparent;
  position: relative;
  overflow: hidden;
  flex: 1;
  min-height: 0;
  transition: background 1s ease, border-color 1s ease;
}

/* Past periods — dark, desaturated, faded */
.pr.past {
  opacity: .18;
  background: var(--bg);
  filter: saturate(0);
}

/* Future periods */
.pr.future {
  background: var(--panel);
  border-color: var(--border2);
}

/* Active period — gradient fill driven by --pct, larger padding for height */
.pr.current {
  --pct: 0%;
  background: linear-gradient(to right, #1a3a6a var(--pct), var(--blue-dark) var(--pct));
  border-color: var(--blue-border);
  padding: 0.5rem .9rem;
  z-index: 1;
  flex: 1;
  transition: background 1s ease, border-color 1s ease, flex 1s ease, padding 1s ease;
}

/* Blue left accent bar on active period */
.pr.current::before {
  content: '';
  position: absolute;
  left: 0;
  top: 12%;
  height: 76%;
  width: 3px;
  background: var(--blue-accent);
  border-radius: 0 3px 3px 0;
}

/* Shrinking state — transitions back to inactive appearance */
.pr.current.shrinking {
  padding: 0 .9rem;
  flex: 1;
  background: var(--panel);
  border-color: var(--border2);
}

/* End of day row */
.pr.eod { background: var(--green-bg); border-color: transparent; }
.pr.eod.future { border-color: transparent; }
.pr.eod.current {
  --pct: 0%;
  background: linear-gradient(to right, #0d3020 var(--pct), #0d2018 var(--pct));
  border-color: #1e5030;
}

/* Break row */
.brk .prn { font-style: italic; color: #3a4a5a; }
.brk.current .prn { color: #5a7a9a; }

/* ── ROW TEXT ──
   Font sizes use viewport units so they scale naturally across screen sizes.
   Active period name is larger; times stay the same size as inactive rows. */
.prt {
  font-size: clamp(.55rem, 1.1vw, 1rem);
  color: var(--text4);
  white-space: nowrap;
}
.prn {
  font-size: clamp(.65rem, 1.2vw, 1.1rem);
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
}
.pre {
  font-size: clamp(.55rem, 1.1vw, 1rem);
  color: var(--blue-dim);
  text-align: right;
  white-space: nowrap;
  justify-self: end;
  width: 100%;
}

/* Active period — only name is larger, times stay small */
.pr.current .prt { color: #5a8bbf; font-size: clamp(.55rem, 1.1vw, 1rem); }
.pr.current .prn { color: #c8dff5; font-weight: 500; font-size: clamp(1rem, 2.2vw, 2rem); }
.pr.current .pre { color: var(--blue-mid); font-size: clamp(.55rem, 1.1vw, 1rem); }

.pr.eod .prn { color: var(--green-text); font-style: italic; }
.pr.eod.current .prn { color: var(--green-accent); }

.eod-tag { font-size: .56rem; color: #2a4a3a; margin-left: 4px; }

/* ── ANIMATED DOT on active period ── */
.ndot {
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--blue-accent);
  border-radius: 50%;
  margin-right: 5px;
  vertical-align: middle;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.2;} }

/* ── NO SCHOOL SCREEN ── */
#noschool-screen { display: none; padding: 1.5rem; height: 100vh; overflow: hidden; }
#noschool-screen.visible { display: flex; flex-direction: column; }
.noschool-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--panel);
  border: 0.5px solid var(--border);
  border-radius: 16px;
  gap: .5rem;
  overflow: hidden;
}
.noschool-clock { text-align: center; }
.noschool-clock .clock-time { justify-items: center; }
.noschool-clock .clock-date { font-size: 1rem; color: var(--text3); margin-top: .3rem; text-align: center; }
.noschool-divider { width: 4rem; height: 1px; background: var(--border); margin: .75rem 0; }
.noschool-icon { font-size: 3rem; margin-bottom: .5rem; opacity: .4; }
.noschool-title { font-family: 'Fraunces', serif; font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 700; color: #c8bfa8; margin-bottom: .25rem; }
.noschool-sub { font-size: clamp(.7rem, 1.2vw, .9rem); color: var(--text3); }

/* ── PORTRAIT / NARROW LAYOUT ── */
@media (max-aspect-ratio: 1/1) {
  #display-screen {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr;
    height: 100dvh;
    padding: 1.5vw;
    gap: 1.5vw;
  }
  #left-panel {
    grid-column: 1;
    grid-row: 1;
    flex-direction: row;
    align-items: stretch;
    justify-content: space-between;
    gap: 2vw;
    padding: 2.5vw 3vw;
  }
  .left-clock-block {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 0 0 clamp(120px, 42vw, 260px);
    min-width: 0;
    overflow: hidden;
  }
  .clock-hm { font-size: clamp(2rem, 13vw, 6rem); }
  .clock-seconds { font-size: clamp(1.2rem, 7.5vw, 3.5rem); }
  .clock-ampm { font-size: clamp(.8rem, 3.5vw, 1.6rem); }
  #left-panel > div:last-child {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    min-width: 0;
  }
  .now-card { flex: 1; min-width: 0; }
  #right-top { grid-column: 1; grid-row: 2; }
  #sched-list { grid-column: 1; grid-row: 3; }

  /* Narrower font sizes on phone */
  .prt { font-size: clamp(.55rem, 2.8vw, .9rem); }
  .prn { font-size: clamp(.65rem, 3vw, 1rem); }
  .pre { font-size: clamp(.55rem, 2.8vw, .9rem); }
  .pr.current .prn { font-size: clamp(.9rem, 4.5vw, 1.4rem); }
  .pr.current { padding: .35rem .9rem; }
  .pr.current.shrinking { padding: 0 .9rem; }
  .pr {
    grid-template-columns: minmax(0, 4.5rem) 1fr minmax(0, 4.5rem);
  }
}

/* ── LOADING SCREEN ── */
#loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.loading-text { font-family: 'Fraunces', serif; font-size: 1.5rem; color: var(--text3); font-weight: 300; }

/* ── ERROR SCREEN ── */
#error-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  align-items: center;
  justify-content: center;
  z-index: 200;
  flex-direction: column;
  gap: 1rem;
}
#error-screen.visible { display: flex; }
.error-title { font-family: 'Fraunces', serif; font-size: 2rem; color: #c05050; font-weight: 300; }
.error-sub { font-size: .8rem; color: var(--text4); }
</style>
</head>
<body>

<!-- Loading screen shown while data is fetched from Supabase -->
<div id="loading-screen"><div class="loading-text">Loading...</div></div>

<!-- Error screen shown if the school slug in the URL is not found -->
<div id="error-screen">
  <div class="error-title">School not found</div>
  <div class="error-sub" id="error-sub">Check the URL and try again.</div>
</div>

<!-- Main display screen, hidden until data loads successfully -->
<div id="display-screen" style="display:none;">
  <div id="left-panel">
    <div class="left-clock-block">
      <div class="school-name" id="d-school">School</div>
      <div class="clock-wrap">
        <div class="clock-time">
          <span class="clock-hm" id="d-time">--:--</span>
          <div class="clock-seconds-row">
            <span class="clock-seconds" id="d-secs">00</span>
            <span class="clock-ampm" id="d-ampm"></span>
          </div>
        </div>
        <div class="clock-date" id="d-date"></div>
      </div>
    </div>
    <div>
      <div class="day-badge" id="d-daybadge">Day 1</div>
      <div class="now-card">
        <div class="now-label" id="d-nowlabel">Now in session</div>
        <div class="now-name" id="d-nowname">—</div>
        <div class="now-time" id="d-nowtime"></div>
        <div class="prog-wrap"><div class="prog-bar" id="d-progbar" style="width:0%"></div></div>
        <div class="prog-remain" id="d-remain"></div>
      </div>
    </div>
  </div>

  <div id="right-top">
    <div class="header-title" id="d-override-label">Today's Schedule</div>
    <div class="header-right"><div class="day-pill" id="d-weekday"></div></div>
  </div>

  <div id="sched-list"></div>
</div>

<!-- No school screen shown on weekends and no-school dates -->
<div id="noschool-screen">
  <div class="noschool-main">
    <div class="noschool-clock">
      <div class="school-name" id="ns-school" style="text-align:center;margin-bottom:.5rem;"></div>
      <div class="clock-time">
        <span class="clock-hm" id="ns-time">--:--</span>
        <div class="clock-seconds-row">
          <span class="clock-seconds" id="ns-secs">00</span>
          <span class="clock-ampm" id="ns-ampm"></span>
        </div>
      </div>
      <div class="clock-date" id="ns-date"></div>
    </div>
    <div class="noschool-divider"></div>
    <div class="noschool-icon">&#9790;</div>
    <div class="noschool-title" id="ns-title">No School Today</div>
    <div class="noschool-sub" id="ns-sub">Enjoy your day off</div>
  </div>
</div>

<script>
// ── SUPABASE CONFIGURATION ────────────────────────────────────
// SUPABASE_ANON_KEY is safe for client-side, respects RLS policies.
// School slug is read from URL query parameter ?school=slug
const SUPABASE_URL = 'https://zatmvuxtgunoruvvofcr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphdG12dXh0Z3Vub3J1dnZvZmNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMDIzMjksImV4cCI6MjA5MTU3ODMyOX0.gF6jtv4IyJj1C_XXt7ZmHXRr8ZcxAKk1CchsJvu76AI';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Read school slug from URL — e.g. /index.html?school=ludus
const params = new URLSearchParams(window.location.search);
const SCHOOL_SLUG = params.get('school') || 'ludus';

// ── SCHEDULE STATE ────────────────────────────────────────────
// S holds all schedule data for the current school.
// Reloaded every 60 seconds to pick up admin changes.
let S = {
  schoolName: '',
  rotLen: 5,
  rotMode: 'calendar',
  anchor: null,
  days: [],
  eods: [],
  dayNames: [],
  wads: [],
  overrides: [],
  noSchool: []
};

// ── DEFAULT DATA ──────────────────────────────────────────────
const DEFAULT_SCHEDULE = [
  {name:"Morning Homeroom",start:"08:00",end:"08:15",isBreak:false},
  {name:"Period 1",start:"08:15",end:"09:10",isBreak:false},
  {name:"Period 2",start:"09:10",end:"10:05",isBreak:false},
  {name:"Morning Break",start:"10:05",end:"10:20",isBreak:true},
  {name:"Period 3",start:"10:20",end:"11:15",isBreak:false},
  {name:"Period 4",start:"11:15",end:"12:10",isBreak:false},
  {name:"Lunch",start:"12:10",end:"13:00",isBreak:true},
  {name:"Period 5",start:"13:00",end:"13:55",isBreak:false},
  {name:"Period 6",start:"13:55",end:"14:50",isBreak:false},
  {name:"Afternoon Advisory",start:"14:50",end:"15:10",isBreak:false}
];
const DEFAULT_EOD = {name:"School day ends", end:"15:10", show:false};

// ── LOAD FROM SUPABASE ────────────────────────────────────────
// Fetches school and schedule data. Called on load and every 60s.
async function loadFromSupabase() {
  const { data: schoolData, error: schoolError } = await db
    .from('schools')
    .select('id, name')
    .eq('slug', SCHOOL_SLUG)
    .single();

  if (schoolError || !schoolData) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-sub').textContent = 'No school found for "' + SCHOOL_SLUG + '"';
    document.getElementById('error-screen').classList.add('visible');
    return;
  }

  const { data: schedData } = await db
    .from('schedules')
    .select('data')
    .eq('school_id', schoolData.id)
    .single();

  const saved = schedData?.data || {};
  S.schoolName = schoolData.name;
  S.rotLen = saved.rotLen || 5;
  S.rotMode = saved.rotMode || 'calendar';
  S.anchor = saved.anchor || null;
  S.days = saved.days || [];
  S.eods = saved.eods || [];
  S.dayNames = saved.dayNames || [];
  S.wads = saved.wads || [];
  S.overrides = saved.overrides || [];
  S.noSchool = saved.noSchool || [];
  normalizeDays();

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('display-screen').style.display = 'grid';
  renderDisplay();
}

// ── NORMALIZE DAYS ────────────────────────────────────────────
function normalizeDays() {
  while (S.days.length < S.rotLen) S.days.push(JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)));
  while (S.eods.length < S.rotLen) S.eods.push(Object.assign({}, DEFAULT_EOD));
  while (S.dayNames.length < S.rotLen) S.dayNames.push('Day ' + (S.dayNames.length + 1));
  S.days = S.days.slice(0, S.rotLen);
  S.eods = S.eods.slice(0, S.rotLen);
  S.dayNames = S.dayNames.slice(0, S.rotLen);
}

function getDayName(idx) {
  return (S.dayNames && S.dayNames[idx]) ? S.dayNames[idx] : 'Day ' + (idx + 1);
}

// ── TIME UTILITIES ────────────────────────────────────────────
function t2m(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function nowM() { const n=new Date(); return n.getHours()*60+n.getMinutes()+n.getSeconds()/60; }
function fmt(t) {
  let [h,m]=t.split(':').map(Number);
  const ap=h>=12?'PM':'AM';
  if(h>12)h-=12; if(h===0)h=12;
  return h+':'+String(m).padStart(2,'0')+' '+ap;
}
function dateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr() { return dateStr(new Date()); }

// ── ROTATION LOGIC ────────────────────────────────────────────
// Returns 0-based rotation day index. Returns null on weekends.
function getTodayDayIndex() {
  const today = new Date();
  if (S.rotMode === 'calendar') {
    const dow = today.getDay();
    if (dow === 0 || dow === 6) return null;
    return (dow - 1) % S.rotLen;
  } else {
    if (!S.anchor) return 0;
    const anchorDate = new Date(S.anchor.date + 'T12:00:00');
    const anchorIdx = S.anchor.dayIndex;
    const noSchoolSet = new Set(S.noSchool.map(n => n.date));
    let count = 0;
    const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const anchorDay = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), anchorDate.getDate());
    let cur;
    if (todayDate < anchorDay) {
      cur = new Date(anchorDay);
      cur.setDate(cur.getDate() - 1);
      while (cur >= todayDate) {
        const ds = dateStr(cur);
        const dow = cur.getDay();
        if (dow !== 0 && dow !== 6 && !noSchoolSet.has(ds)) count--;
        cur.setDate(cur.getDate() - 1);
      }
    } else {
      cur = new Date(anchorDay);
      cur.setDate(cur.getDate() + 1);
      while (cur <= todayDate) {
        const ds = dateStr(cur);
        const dow = cur.getDay();
        if (dow !== 0 && dow !== 6 && !noSchoolSet.has(ds)) count++;
        cur.setDate(cur.getDate() + 1);
      }
    }
    return ((anchorIdx + count) % S.rotLen + S.rotLen) % S.rotLen;
  }
}

function getOverrideForToday() {
  return S.overrides.find(o => o.date === todayStr()) || null;
}
function isNoSchoolToday() { return S.noSchool.some(n => n.date === todayStr()); }
function isWeekend() { const d = new Date().getDay(); return d === 0 || d === 6; }

// ── BUILD SCHEDULE LIST ───────────────────────────────────────
function buildList(blocks, eod) {
  const es = blocks.length ? blocks[blocks.length-1].end : '08:00';
  const list = [...blocks];
  if (eod.show) list.push({name: eod.name, start: es, end: eod.end, isBreak: false, isEod: true});
  return list;
}

// ── GET ACTIVE SCHEDULE ───────────────────────────────────────
// Priority: Date Override > Weekly Adjusted Day > Normal Rotation Day
function getActiveSchedule() {
  // Priority 1: Date override
  const ov = getOverrideForToday();
  if (ov) return { blocks: ov.blocks, eod: ov.eod, label: ov.label, isOverride: true };

  // Priority 2: Weekly Adjusted Day
  const todayDow = new Date().getDay();
  if (todayDow >= 1 && todayDow <= 5) {
    const wadDow = todayDow - 1;
    const wad = (S.wads || []).find(w => w.dayOfWeek === wadDow);
    if (wad) {
      if (wad.variants && wad.variants.length > 0) {
        const rotIdx = getTodayDayIndex();
        const variant = wad.variants.find(v => v.rotDayIdx === rotIdx);
        if (variant) {
          const rotDayName = S.dayNames[rotIdx] || 'Day ' + (rotIdx + 1);
          return { blocks: variant.blocks, eod: variant.eod, label: rotDayName, isOverride: false, isWad: true };
        }
      }
      return { blocks: wad.blocks, eod: wad.eod, label: wad.label || wad.dayName, isOverride: false, isWad: true };
    }
  }

  // Priority 3: Normal rotation day
  const idx = getTodayDayIndex();
  if (idx === null) return null;
  return { blocks: S.days[idx], eod: S.eods[idx], label: null, isOverride: false, isWad: false, dayIdx: idx };
}

// ── CLOCK RENDERING ───────────────────────────────────────────
// Updates clock elements. Called every second.
function renderClock(prefix) {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const ap = h>=12?'PM':'AM';
  if(h>12)h-=12; if(h===0)h=12;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mos=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dn=['SUN','MON','TUE','WED','THU','FRI','SAT'];
  set(prefix+'-time', h+':'+m);
  set(prefix+'-secs', s);
  set(prefix+'-ampm', ap);
  set(prefix+'-date', days[now.getDay()]+', '+mos[now.getMonth()]+' '+now.getDate());
  if (document.getElementById('d-weekday')) document.getElementById('d-weekday').textContent = dn[now.getDay()];
}

function set(id, val) { const el=document.getElementById(id); if(el) el.textContent=val; }

// ── MAIN DISPLAY RENDER ───────────────────────────────────────
// Called every 10 seconds. Decides which screen to show.
function renderDisplay() {
  renderClock('d');
  set('d-school', S.schoolName);
  set('ns-school', S.schoolName);

  const noSch = isNoSchoolToday();
  const weekend = isWeekend();
  const nsEl = document.getElementById('noschool-screen');
  const dsEl = document.getElementById('display-screen');

  if (noSch || weekend) {
    dsEl.style.display = 'none';
    nsEl.classList.add('visible');
    renderClock('ns');
    if (weekend) {
      set('ns-title', 'No School Today');
      set('ns-sub', 'Enjoy your weekend!');
    } else {
      const ns = S.noSchool.find(n => n.date === todayStr());
      set('ns-title', ns && ns.label ? ns.label : 'No School Today');
      set('ns-sub', 'See you next school day');
    }
    return;
  }

  nsEl.classList.remove('visible');
  dsEl.style.display = 'grid';

  const active = getActiveSchedule();
  if (!active) { renderEmptyState(); return; }

  const { blocks, eod, label, isOverride, isWad, dayIdx } = active;
  const list = buildList(blocks, eod);

  const now = nowM();
  const firstStart = t2m(list[0].start);
  const lastEnd = t2m(list[list.length - 1].end);

  // Show good morning countdown screen before school starts
  if (now < firstStart - 45) {
    document.getElementById('display-screen').style.display = 'none';
    const nsEl = document.getElementById('noschool-screen');
    nsEl.classList.add('visible');
    renderClock('ns');
    set('ns-school', S.schoolName);
    set('ns-title', 'Good Morning');
    const totalSecsRemaining = Math.ceil((firstStart - now) * 60);
    const hrs = Math.floor(totalSecsRemaining / 3600);
    const mins = Math.floor((totalSecsRemaining % 3600) / 60);
    const secs = totalSecsRemaining % 60;
    let countdown = 'School starts in ';
    if (hrs > 0) countdown += hrs + ' hour' + (hrs !== 1 ? 's' : '') + ', ';
    if (hrs > 0 || mins > 0) countdown += mins + ' minute' + (mins !== 1 ? 's' : '') + ', ';
    countdown += secs + ' second' + (secs !== 1 ? 's' : '');
    set('ns-sub', countdown);
    return;
  }

  // Show end-of-day screen 5 minutes after the last period ends
  if (now >= lastEnd + 5) {
    document.getElementById('display-screen').style.display = 'none';
    const nsEl = document.getElementById('noschool-screen');
    nsEl.classList.add('visible');
    renderClock('ns');
    set('ns-school', S.schoolName);
    set('ns-title', 'School Day Complete');
    const isFriday = new Date().getDay() === 5;
    set('ns-sub', isFriday ? 'See you next week!' : 'See you tomorrow!');
    return;
  }

  set('d-daybadge', isOverride || isWad ? label : getDayName(dayIdx));
  set('d-override-label', isOverride || isWad ? label + ' Schedule' : getDayName(dayIdx) + ' Schedule');

  renderCard(list);
  renderSchedule(list, false);
}

// ── NOW CARD RENDER ───────────────────────────────────────────
// Updates the current period card in the left panel.
function renderCard(list) {
  const now = nowM();
  let idx = -1;
  for (let i=0;i<list.length;i++) {
    if(now>=t2m(list[i].start)&&now<t2m(list[i].end)){idx=i;break;}
  }
  const nn=document.getElementById('d-nowname');
  const nt=document.getElementById('d-nowtime');
  const pb=document.getElementById('d-progbar');
  const pr=document.getElementById('d-remain');
  const nl=document.getElementById('d-nowlabel');

  if (idx===-1) {
    const first=t2m(list[0].start), last=t2m(list[list.length-1].end);
    if (now<first) {
      nn.textContent='School not yet started';
      nt.textContent='Starts at '+fmt(list[0].start);
      nl.textContent='Upcoming';
      pb.style.width='0%'; pr.textContent='';
    } else if (now>=last) {
      nn.textContent='School day complete';
      nt.textContent='See you tomorrow!';
      nl.textContent='End of day';
      pb.style.width='0%'; pr.textContent='';
    } else {
      // Passing time — show countdown to next class
      const next = list.find(p => t2m(p.start) > now);
      if (next) {
        const prevEnd = list.filter(p => t2m(p.end) <= now).pop();
        const gapStart = prevEnd ? t2m(prevEnd.end) : now;
        const gapEnd = t2m(next.start);
        const gapTotal = gapEnd - gapStart;
        const gapRemain = gapEnd - now;
        const pct = gapTotal > 0 ? Math.min(100, ((now - gapStart) / gapTotal) * 100).toFixed(4) : 0;
        nl.textContent = 'Passing time';
        nn.textContent = next.name + ' starts soon';
        nt.textContent = 'Begins at ' + fmt(next.start);
        pb.style.width = pct + '%';
        if (gapRemain <= 1) {
          const remSecs = Math.ceil(gapRemain * 60);
          pr.textContent = remSecs <= 0 ? 'Starting now' : remSecs + 's until next class';
        } else {
          pr.textContent = Math.ceil(gapRemain) + ' min until next class';
        }
      }
    }
    return;
  }

  const p=list[idx], s=t2m(p.start), e=t2m(p.end);
  const nowExact = nowM();
  const pct = Math.min(100, ((nowExact-s)/(e-s))*100).toFixed(4);
  const remMins = e - nowExact;
  nl.textContent = p.isEod ? 'End of school day' : p.isBreak ? p.name : 'Now in session';
  nn.textContent = p.name;
  nt.textContent = fmt(p.start)+' \u2013 '+fmt(p.end);
  pb.style.width = pct+'%';
  if (remMins <= 1) {
    const remSecs = Math.ceil(remMins * 60);
    pr.textContent = remSecs <= 0 ? 'Starting now' : remSecs + 's remaining';
  } else {
    pr.textContent = Math.ceil(remMins) + ' min remaining';
  }
}

// ── SCHEDULE LIST RENDER ──────────────────────────────────────
// Only rebuilds DOM when active period changes or schedule changes.
let _lastActiveIdx = -2;
let _lastListKey = '';

function listKey(list) { return list.map(p => p.start+p.end+p.name).join('|'); }

function renderSchedule(list, forceRebuild) {
  const el = document.getElementById('sched-list');
  const now = nowM();
  let curIdx = -1;
  for (let i=0;i<list.length;i++) {
    if (now>=t2m(list[i].start) && now<t2m(list[i].end)) { curIdx=i; break; }
  }
  const key = listKey(list);

  if (forceRebuild || curIdx !== _lastActiveIdx || key !== _lastListKey) {
    _lastActiveIdx = curIdx;
    _lastListKey = key;
    el.innerHTML = '';
    list.forEach((p, i) => {
      const s=t2m(p.start), e=t2m(p.end);
      const isCur=i===curIdx, isPast=now>=e&&!isCur;
      const d=document.createElement('div');
      d.className='pr'+(p.isBreak?' brk':'')+(p.isEod?' eod':'')+(isCur?' current':isPast?' past':' future');
      d.dataset.idx = i;
      if (isCur) {
        const pct = Math.min(100, Math.round(((now-s)/(e-s))*100));
        d.style.setProperty('--pct', pct+'%');
      }
      const lock=p.isEod?'<span class="eod-tag">&#x25CF; end of day</span>':'';
      d.innerHTML='<div class="prt">'+fmt(p.start)+'</div>'
        +'<div class="prn">'+(isCur?'<span class="ndot"></span>':'')+p.name+lock+'</div>'
        +'<div class="pre">'+fmt(p.end)+'</div>';
      el.appendChild(d);
    });
    return true;
  }

  // Just update gradient on current row
  if (curIdx >= 0) {
    const p = list[curIdx];
    const s=t2m(p.start), e=t2m(p.end);
    const pct = Math.min(100, Math.round(((now-s)/(e-s))*100));
    const curRow = el.querySelector('.pr.current');
    if (curRow) curRow.style.setProperty('--pct', pct+'%');
  }
  return false;
}

function renderEmptyState() {
  set('d-daybadge','—');
  set('d-nowname','No schedule configured');
  set('d-nowtime','');
  document.getElementById('sched-list').innerHTML='';
}

// ── CARD TICK ─────────────────────────────────────────────────
// Called every second for smooth progress bar and seconds countdown.
// Also handles grow/shrink animation on active row.
function renderCardTick() {
  const active = getActiveSchedule();
  if (!active) return;
  const { blocks, eod } = active;
  const list = buildList(blocks, eod);
  if (!list || !list.length) return;

  const now = nowM();
  let curIdx = -1;
  for (let i=0;i<list.length;i++) {
    if (now>=t2m(list[i].start) && now<t2m(list[i].end)) { curIdx=i; break; }
  }

  // If period just ended, trigger a single rebuild
  if (curIdx === -1) {
    if (renderCardTick._wasActive) {
      renderCardTick._wasActive = false;
      _lastActiveIdx = -2;
      renderDisplay();
    }
    renderCard(list);
    return;
  }

  // Detect period switch
  const justSwitched = renderCardTick._lastCurIdx !== curIdx;
  renderCardTick._lastCurIdx = curIdx;
  renderCardTick._wasActive = true;

  if (justSwitched) {
    _lastActiveIdx = -2;
    renderDisplay();
    // Trigger grow animation: briefly add shrinking class then remove it
    setTimeout(() => {
      const curRow = document.querySelector('.pr.current');
      if (!curRow) return;
      curRow.classList.add('shrinking');
      requestAnimationFrame(() => requestAnimationFrame(() => {
        curRow.classList.remove('shrinking');
      }));
    }, 50);
    return;
  }

  renderCard(list);

  // Shrink animation in last second of period
  const curRow = document.querySelector('.pr.current');
  if (!curRow) return;
  const p = list[curIdx];
  const remaining = (t2m(p.end) - now) * 60;
  if (remaining <= 1) {
    curRow.classList.add('shrinking');
  } else {
    curRow.classList.remove('shrinking');
  }
}
renderCardTick._wasActive = false;
renderCardTick._lastCurIdx = -1;

// ── INITIALIZATION ────────────────────────────────────────────
loadFromSupabase();
setInterval(() => {
  renderClock('d');
  renderClock('ns');
  const nsEl = document.getElementById('noschool-screen');
  if (nsEl.classList.contains('visible')) {
    const active2 = getActiveSchedule();
    if (active2) {
      const list2 = buildList(active2.blocks, active2.eod);
      const firstStart2 = t2m(list2[0].start);
      const now2 = nowM();
      if (now2 < firstStart2) {
        const totalSecsRemaining = Math.ceil((firstStart2 - now2) * 60);
        const hrs = Math.floor(totalSecsRemaining / 3600);
        const mins = Math.floor((totalSecsRemaining % 3600) / 60);
        const secs = totalSecsRemaining % 60;
        let countdown = 'School starts in ';
        if (hrs > 0) countdown += hrs + ' hour' + (hrs !== 1 ? 's' : '') + ', ';
        if (hrs > 0 || mins > 0) countdown += mins + ' minute' + (mins !== 1 ? 's' : '') + ', ';
        countdown += secs + ' second' + (secs !== 1 ? 's' : '');
        set('ns-sub', countdown);
      }
    }
  }
}, 1000);
setInterval(renderCardTick, 1000);
setInterval(renderDisplay, 10000);
setInterval(loadFromSupabase, 60000);
window.addEventListener('resize', () => { _lastActiveIdx = -2; renderDisplay(); });
window.addEventListener('orientationchange', () => { _lastActiveIdx = -2; renderDisplay(); });
</script>
